[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prism-platform"
version = "0.1.0"
description = "Local personal AI assistant — decides, plans, executes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["psutil>=5.9", "Pillow>=10.0"]
urls = { Homepage = "https://github.com/chizoalban2003-beep/Prism", Repository = "https://github.com/chizoalban2003-beep/Prism" }

[project.optional-dependencies]
full = ["playwright", "openai-whisper", "pyaudio", "pydub", "pdfplumber",
        "openpyxl", "aiohttp", "mss"]

[project.scripts]
prism = "kde_cli:main"
kde = "kde_cli:main"
ksa = "ksa_cli:main"

[tool.setuptools]
license-files = ["LICENSE"]
py-modules = [
    "artifact_store",
    "daily_workflow",
    "decision_spectrum",
    "device_hub",
    "digital_identity",
    "domain_configs",
    "domain_validator",
    "duel_analyzer",
    "identity_bus",
    "kde_agent",
    "kde_cli",
    "kde_config",
    "kde_dashboard",
    "kde_profiles",
    "kde_server",
    "kde_ui",
    "ksa_agent",
    "ksa_cli",
    "ksa_config",
    "ksa_executor",
    "ksa_fixes",
    "ksa_jarvis",
    "ksa_lever",
    "ksa_optimizer",
    "ksa_registry",
    "ksa_router",
    "media_processor",
    "moment_analyzer",
    "moment_configs_ext",
    "moment_pipeline",
    "moment_validator",
    "prediction_engine",
    "prism_agent",
    "prism_browser_agent",
    "prism_calendar",
    "prism_calibration",
    "prism_chat",
    "prism_collaborator",
    "prism_contacts",
    "prism_device_agent",
    "prism_device_executor",
    "prism_device_resolver",
    "prism_device_scanner",
    "prism_email",
    "prism_executor_agent",
    "prism_instructions",
    "prism_llm_router",
    "prism_memory",
    "prism_perception",
    "prism_planner",
    "prism_policy",
    "prism_proactive",
    "prism_push",
    "prism_responses",
    "prism_search",
    "prism_service_discovery",
    "prism_smart_home",
    "prism_task_queue",
    "prism_tasks",
    "prism_tool_finder",
    "prism_tts",
    "sport_data",
    "sport_executor",
    "sport_spectrum",
