[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "requires_hardware: tests that require physical hardware (Apple Watch, GoPro, etc.) — skipped in CI",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B007", "B904", "SIM910", "SIM114"]
ignore = [
    "UP045",  # Optional[X] → X | None (large churn, deferred)
    "UP035",  # deprecated typing imports (some are 3.11-safe but noisy)
    "UP042",  # StrEnum — runtime behavior change, deferred
    "B905",   # zip(strict=) — would require strict=False everywhere, deferred
]

[tool.ruff.lint.per-file-ignores]
# HTML/SVG/JS embedded strings cannot be wrapped
"prism_chat.py" = ["E501"]
"kde_ui.py" = ["E501"]
"prism_pwa.py" = ["E501"]
# HTML/SVG/JS embedded strings cannot be wrapped
"prism_routes_identity.py" = ["E501"]
"prism_routes_users.py" = ["E501"]
# LLM prompt templates contain long lines that must not be reformatted
"prism_chain.py" = ["E501"]
"prism_chain_expert.py" = ["E501"]
"prism_planner.py" = ["E501"]
# pytest.importorskip must precede conditional imports
"tests/test_torch_models.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
