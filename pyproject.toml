[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kde-platform"
version = "0.1.0"
description = "Kinetic Decision Engine — local sports intelligence and decision platform"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = ["psutil>=5.9", "Pillow>=10.0"]
urls = { Homepage = "https://github.com/chizoalban2003-beep/KSA", Repository = "https://github.com/chizoalban2003-beep/KSA" }

[project.optional-dependencies]
video = ["ffmpeg-python"]
full = ["ffmpeg-python"]

[project.scripts]
kde = "kde_cli:main"
ksa = "ksa_cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
