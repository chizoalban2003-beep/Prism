[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prism-platform"
version = "0.1.1"
description = "Local personal AI assistant — decides, plans, executes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "psutil>=5.9",
  "Pillow>=10.0,<12.0",
  "pyyaml>=6.0",
  "fastapi>=0.111,<1.0",
  "uvicorn[standard]>=0.29",
  "httpx>=0.27",
  "anyio[trio]>=4.0",
  "python-multipart>=0.0.18",
]
urls = { Homepage = "https://github.com/chizoalban2003-beep/Prism", Repository = "https://github.com/chizoalban2003-beep/Prism" }

[project.optional-dependencies]
messaging = ["python-telegram-bot>=21.0,<22.0", "twilio>=8.0,<10.0"]
ml = ["scikit-learn>=1.4", "xgboost>=2.0", "lightgbm>=4.0", "numpy>=1.26"]
torch = ["torch>=2.0"]
lora = ["unsloth>=2024.1", "trl>=0.8", "peft>=0.10", "datasets>=2.18"]
full = ["playwright", "openai-whisper", "faster-whisper", "pyaudio", "pydub",
        "pdfplumber", "openpyxl", "aiohttp", "mss", "twilio>=8.0,<10.0",
        "anthropic>=0.25,<2.0", "tomli>=2.0",
        "python-telegram-bot>=21.0,<22.0",
        "scikit-learn>=1.4", "xgboost>=2.0", "lightgbm>=4.0", "numpy>=1.26",
        "unsloth>=2024.1", "trl>=0.8", "peft>=0.10", "datasets>=2.18",
        "pystray>=0.19", "pywebview>=5.0"]
tray = ["pystray>=0.19", "pywebview>=5.0", "Pillow>=10.0,<12.0"]
dev  = ["ruff>=0.4.0", "pytest>=7.0", "mypy>=1.8", "pytest-cov>=4.0", "anyio[trio]>=4.0", "httpx>=0.27",
        "fastapi>=0.111", "python-multipart>=0.0.18"]

[project.scripts]
prism = "prism_daemon:main"
prism-tray = "prism_tray:main"
kde = "kde_cli:main"
ksa = "ksa_cli:main"

