name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E,W,F --ignore E501,E701,E702
        # E501 = line length (not enforced)
        # E701/E702 = single-line compound statements (intentional style in this codebase)
        # F = pyflakes (unused imports, undefined names)
        # E,W = pycodestyle errors and warnings

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          python -m pip install .

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Smoke test
        run: |
          timeout 10 python kde_cli.py server --port 8743 &
          sleep 4
          curl -f http://localhost:8743/status || exit 1
          kill %1 || true

      - name: Smoke test installed CLIs
        run: |
          prism --help > /dev/null
          kde --help > /dev/null
          ksa --help > /dev/null
