name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python3 -m pip install -e ".[full]" || python3 -m pip install -e .

      - name: Lint with ruff
        run: python3 -m ruff check .

      - name: Run tests
        run: python3 -m pytest -x -q --tb=short

      - name: Type-check with mypy (allow failure)
        run: >
          python3 -m mypy prism_agent.py prism_chain.py prism_llm_router.py
          --ignore-missing-imports --no-error-summary || true
