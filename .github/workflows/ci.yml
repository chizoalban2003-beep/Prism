name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python3 -m pip install -e ".[dev]" || python3 -m pip install -e .
          python3 -m pip install pytest-cov
          # Async server stack
          python3 -m pip install "fastapi>=0.111" "uvicorn[standard]>=0.29" "httpx>=0.27" "anyio[trio]>=4.0"
          # Safe optional extras (excludes playwright/whisper/pyaudio — heavy system deps)
          python3 -m pip install anthropic aiohttp pdfplumber openpyxl twilio || true

      - name: Lint with ruff
        run: python3 -m ruff check .

      - name: Run tests with coverage
        run: |
          python3 -m pytest -x -q --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing:skip-covered \
            --cov-fail-under=70 \
            --ignore=tests/test_device_agent.py
            # test_device_agent.py requires physical hardware (Apple Watch / GoPro); skipped in CI

      - name: Performance gate (TAD §8 SLO)
        run: python3 -m pytest tests/test_performance_gate.py -q --tb=short

      - name: Type-check core modules
        run: >
          python3 -m mypy
          prism_agent.py prism_chain.py prism_llm_router.py
          prism_orchestrator.py prism_organ_loader.py prism_horizon.py
          prism_outcome_tracker.py prism_memory.py
          prism_llm_ledger.py
          prism_bud_manager.py prism_memory_graph.py prism_spectrum_middleware.py
          prism_wal.py prism_watchdog.py prism_shadow_pipeline.py prism_metrics.py
          prism_phase.py prism_perception.py prism_lora_registry.py
          prism_silicon_policy.py prism_tvm_bridge.py prism_context_budget.py
          prism_speculative.py
          --ignore-missing-imports --no-error-summary || true

      - name: Type-check ASGI stack
        run: >
          python3 -m mypy
          prism_asgi.py prism_state.py prism_daemon.py
          prism_routes_agent.py prism_routes_analytics.py prism_routes_chain.py
          prism_routes_core.py prism_routes_horizon.py prism_routes_infra.py
          prism_routes_integrations.py prism_routes_media.py prism_routes_predict.py
          prism_routes_sensors.py prism_routes_ui.py prism_routes_mobile.py
          prism_routes_users.py prism_routes_federation.py prism_routes_perception.py
          prism_routes_causality.py
          --ignore-missing-imports --no-error-summary || true

      - name: Type-check expansion modules
        run: >
          python3 -m mypy
          prism_multi_user.py prism_mobile_sync.py prism_federation.py
          prism_visual_perception.py prism_causality.py
          --ignore-missing-imports --no-error-summary || true

      - name: Security scan (high severity only)
        run: |
          python3 -m pip install bandit --quiet
          python3 -m bandit -r . -ll -x tests/,organs/ --quiet || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
