# PRISM example configuration.
# Copy to `~/.prism/prism_config.toml` (preferred — survives reinstalls) or
# `prism_config.toml` next to prism_agent.py, then edit. Everything is
# optional — PRISM runs locally with no config, degrading gracefully when a
# section is absent. Secrets can also be supplied via environment variables.

# ── LLM provider ──────────────────────────────────────────────────────────────
# Reasoning, organ routing, and synthesis need an LLM. Run `python3
# prism_daemon.py --setup-llm` for an interactive wizard, or set it here.
[llm]
preferred      = "ollama/llama3.2:3b"   # "ollama/<model>" | "claude" | "openai"
fallback       = "ollama"
ollama_host    = "http://localhost:11434"
ollama_model   = "llama3.2:3b"
# request_timeout = 30.0                # seconds per LLM call; raise on slow
                                        # hardware (a few tokens/sec)
# claude_api_key = "sk-ant-..."
# claude_model   = "claude-opus-4-8"    # or "claude-sonnet-5" / "claude-haiku-4-5"
# openai_api_key = "sk-..."
# openai_host    = "https://api.openai.com"

[agent]
# text_model  = "llama3.2:3b"           # overrides [llm].ollama_model for planning
# planner_timeout = 30.0                # seconds per planner LLM call; raise on
                                        # slow hardware (a few tokens/sec) where
                                        # 30s can't finish even a short plan

# ── Model Context Protocol (MCP) ──────────────────────────────────────────────
# Connect external MCP servers; their tools are auto-registered as governed
# organs (intent "mcp.<server>.<tool>") and exposed under /mcp/*.
[mcp]
enabled = false

# [[mcp.servers]]
# name    = "filesystem"
# command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/data"]
# env     = { }

# [[mcp.servers]]
# name    = "github"
# command = ["npx", "-y", "@modelcontextprotocol/server-github"]
# env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "ghp_..." }

# Remote MCP server over Streamable HTTP (use 'url' instead of 'command'):
# [[mcp.servers]]
# name    = "remote"
# url     = "https://mcp.example.com/mcp"
# headers = { Authorization = "Bearer <token>" }

# ── Voice (local STT) ─────────────────────────────────────────────────────────
[voice]
enabled     = false
model       = "base"        # tiny | base | small | medium | large
language    = "en"          # ISO 639-1; blank = auto-detect
sample_rate = 16000

# ── Email (IMAP/SMTP) ─────────────────────────────────────────────────────────
# [email]
# provider  = "gmail"
# address   = "you@gmail.com"
# imap_host = "imap.gmail.com"
# imap_port = 993
# password  = "xxxx xxxx xxxx xxxx"     # Gmail App Password, not your login

# ── Calendar (iCal / CalDAV / Google) ─────────────────────────────────────────
# [calendar]
# provider = "ical_url"
# ical_url = "webcal://..."

# ── Telephony (Twilio) ────────────────────────────────────────────────────────
# [twilio]
# account_sid = "AC..."
# auth_token  = "..."
# from_number = "+1..."

# ── Federation (multi-node sync) ──────────────────────────────────────────────
# Single-node setups: leave commented out — auth is off by default and the
# server binds to 127.0.0.1, so the federation surface isn't exposed.
# Multi-node deployments: flip require_auth to true AND set a token, OR set
# the PRISM_FEDERATION_TOKEN env var. Misconfigured strict mode fails closed.
# [federation]
# require_auth = true
# token        = "<shared-secret>"      # or env PRISM_FEDERATION_TOKEN
# HMAC signing: set env PRISM_FEDERATION_HMAC_SECRET=<secret>

# ── Mobile sync ───────────────────────────────────────────────────────────────
# Device tokens are HMAC-signed. The daemon auto-generates a per-install secret
# at ~/.prism/mobile_sync_secret; override with env PRISM_MOBILE_SECRET.

# ── Tasks (Todoist / GitHub / Linear / local) ─────────────────────────────────
# [tasks]
# provider = "local"
