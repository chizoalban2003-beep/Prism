  </defs>
  <rect width="640" height="220" rx="24" fill="#ffffff"/>
  <rect x="40" y="100" width="150" height="14" rx="7" fill="#CBD5E1" opacity="0.55"/>
  <polygon points="220,72 268,110 220,148" fill="#0F172A" opacity="0.92"/>
  <rect x="70" y="100" width="120" height="14" rx="7" fill="#94A3B8" opacity="0.65"/>
  <line x1="270" y1="108" x2="425" y2="70" stroke="#3B82F6" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
