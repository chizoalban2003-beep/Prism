<svg viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="PRISM — Decision Intelligence">
  <title>PRISM</title>
  <style>
    .bg-fill { fill: transparent; }
    .diamond  { fill: #1a1f2e; }
    .d-inner  { fill: #ffffff; opacity: .22; }
    .spec-bg  { fill: #e5e7eb; }
    .act-main { fill: #1a1f2e; }
    .act-side { fill: #9ca3af; }
    .word     { fill: #1a1f2e; font-family: system-ui,-apple-system,sans-serif;
                font-size: 44px; font-weight: 500; letter-spacing: -2px; }
    .sub      { fill: #6b7280; font-family: system-ui,-apple-system,sans-serif;
                font-size: 12px; font-weight: 400; letter-spacing: .06em; }
    .rule     { stroke: #e5e7eb; stroke-width: .5; }
    @media (prefers-color-scheme: dark) {
      .diamond  { fill: #e8eaf0; }
      .d-inner  { fill: #0f1117; opacity: .25; }
      .spec-bg  { fill: #374151; }
      .act-main { fill: #e8eaf0; }
      .act-side { fill: #6b7280; }
      .word     { fill: #e8eaf0; }
      .sub      { fill: #9ca3af; }
      .rule     { stroke: #374151; }
    }
  </style>

  <!-- Spectrum bar -->
  <rect x="14" y="60" width="76" height="3.5" rx="1.75" class="spec-bg"/>
  <rect x="14" y="60" width="76" height="3.5" rx="1.75"
        fill="url(#sg)" opacity=".85"/>

  <!-- Activation bumps above bar -->
  <ellipse cx="52" cy="50" rx="14" ry="6" fill="#5DCAA5" opacity=".2"/>
  <ellipse cx="52" cy="50" rx="7"  ry="3.5" fill="#5DCAA5" opacity=".4"/>

  <!-- Fulcrum diamond -->
  <polygon points="52,28 65,52 52,76 39,52" class="diamond"/>
  <polygon points="52,34 61,52 52,70 43,52" class="d-inner"/>

  <!-- Activation dot -->
  <circle cx="52" cy="34" r="2.5" class="act-main"/>
  <circle cx="70" cy="38" r="1.5" class="act-side"/>
  <circle cx="34" cy="38" r="1.5" class="act-side"/>

  <!-- Vertical rule -->
  <line x1="108" y1="22" x2="108" y2="98" class="rule"/>

  <!-- Wordmark -->
  <text x="126" y="82" class="word">PRISM</text>

  <!-- Tagline -->
  <text x="127" y="100" class="sub">DECISION INTELLIGENCE</text>

  <!-- Gradient def -->
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3B8BD4"/>
      <stop offset="40%"  stop-color="#5DCAA5"/>
      <stop offset="70%"  stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#E24B4A"/>
    </linearGradient>
  </defs>
</svg>
