[user]
role  = "universal"
name  = "PRISM User"
sport = "Football"
team  = ""

[agent]
db_path      = "~/.prism/prism.db"
media_dir    = "~/.prism/media"
auto_watch   = true
ollama_model = "mistral"
ollama_host  = "http://localhost:11434"
text_model   = "mistral"
ffmpeg_path  = "ffmpeg"
poll_interval = 30

[[devices]]
name       = "Apple Watch"
type       = "apple_watch"
watch_path = "~/Downloads/apple_health_export"

[[devices]]
name       = "GoPro Hero 12"
type       = "gopro"
watch_path = "~/GoPro/DCIM"
api_url    = "http://10.5.5.9:8080"

# ── Email (optional) ─────────────────────────────────────────────────────────
# [email]
# provider    = "gmail"            # "gmail" | "imap"
# address     = "you@gmail.com"
# imap_host   = "imap.gmail.com"
# imap_port   = 993
# smtp_host   = "smtp.gmail.com"
# smtp_port   = 587
# # For Gmail: generate an App Password at myaccount.google.com/apppasswords
# password    = "your-app-password"
# max_fetch   = 20

[email]
provider  = ""                  # set to "gmail" or "imap" to enable
address   = "you@example.com"
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 587
password  = ""                  # Gmail: use App Password from myaccount.google.com
max_fetch = 20

[calendar]
provider    = ""                # set to "ical_url", "caldav", or "google" to enable
ical_url    = ""                # paste a webcal:// or https:// .ics URL here
caldav_url  = ""
username    = ""
password    = ""
google_token = ""               # OAuth2 access token — see developers.google.com/calendar

[search]
provider      = "auto"
brave_api_key = ""
serp_api_key  = ""

[push]
topic    = ""
server   = "https://ntfy.sh"
priority = "default"

[contacts]
google_token = ""
auto_extract = true

[tasks]
provider       = "auto"
todoist_token  = ""
github_token   = ""
github_repo    = ""
linear_api_key = ""

[llm]
# Run `python3 prism_setup_llm.py` or open http://localhost:8742/settings/llm to configure
preferred      = ""          # "ollama/mistral" | "claude" | "openai" | "openai_compat" | ""=auto
ollama_host    = "http://localhost:11434"
ollama_model   = "mistral"   # any model you have pulled: llama3, deepseek-r1, qwen, etc.
claude_api_key = ""          # get from console.anthropic.com  (or set ANTHROPIC_API_KEY)
openai_api_key = ""          # get from platform.openai.com    (or set OPENAI_API_KEY)
openai_host    = "https://api.openai.com"   # change for Groq/Together/LM Studio/Gemini
fallback       = []          # e.g. ["ollama/mistral", "claude"] — ordered fallback chain

[voice]
enabled     = true
model       = "base"      # whisper model: tiny | base | small | medium | large
language    = "en"        # ISO 639-1 — leave blank for auto-detect
sample_rate = 16000       # Hz — 16000 recommended for Whisper

# ── Phone calls / SMS via Twilio (optional) ───────────────────────────────────
# Requires: pip install twilio  (or pip install ".[full]")
# Get credentials from console.twilio.com
# [twilio]
# account_sid = "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
# auth_token  = "your_auth_token_here"
# from_number = "+14155552671"   # Twilio phone number in E.164 format

[twilio]
account_sid = ""          # ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
auth_token  = ""          # from console.twilio.com
from_number = ""          # your Twilio number, e.g. +14155552671
