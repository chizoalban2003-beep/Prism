[user]
role  = "universal"
name  = "PRISM User"
sport = "Football"
team  = ""

[agent]
db_path      = "~/.prism/prism.db"
media_dir    = "~/.prism/media"
auto_watch   = true
ollama_model = "mistral"
ollama_host  = "http://localhost:11434"
text_model   = "mistral"
ffmpeg_path  = "ffmpeg"
poll_interval = 30

# ── LLM providers ─────────────────────────────────────────────────────────────
# Configure one or more providers. PRISM will use the best available within budget.
# API keys can also be set via environment variables (see comment on each key).
[llm]
preferred   = ""          # "anthropic/claude-haiku" | "ollama/mistral" | "groq/llama-3.1-8b"
fallback    = ["ollama", "stdlib"]
ollama_host = "http://localhost:11434"

# Set any of these to enable the provider
anthropic_api_key  = ""   # console.anthropic.com/settings/keys
openai_api_key     = ""   # platform.openai.com/api-keys
google_api_key     = ""   # aistudio.google.com/app/apikey
deepseek_api_key   = ""   # platform.deepseek.com
mistral_api_key    = ""   # console.mistral.ai
groq_api_key       = ""   # console.groq.com (free tier available)
together_api_key   = ""   # api.together.xyz
custom_host        = ""   # any OpenAI-compatible endpoint
custom_api_key     = ""
custom_model       = ""

[llm.budget]
monthly_usd        = 0.0  # 0 = unlimited. Set to e.g. 20.0 for $20/month
auto_approve_usd   = 0.10 # auto-use without asking if estimated cost < this

[[devices]]
name       = "Apple Watch"
type       = "apple_watch"
watch_path = "~/Downloads/apple_health_export"

[[devices]]
name       = "GoPro Hero 12"
type       = "gopro"
watch_path = "~/GoPro/DCIM"
api_url    = "http://10.5.5.9:8080"

# ── Email (optional) ─────────────────────────────────────────────────────────
# [email]
# provider    = "gmail"            # "gmail" | "imap"
# address     = "you@gmail.com"
# imap_host   = "imap.gmail.com"
# imap_port   = 993
# smtp_host   = "smtp.gmail.com"
# smtp_port   = 587
# # For Gmail: generate an App Password at myaccount.google.com/apppasswords
# password    = "your-app-password"
# max_fetch   = 20

[email]
provider  = ""                  # set to "gmail" or "imap" to enable
address   = "you@example.com"
imap_host = "imap.gmail.com"
imap_port = 993
smtp_host = "smtp.gmail.com"
smtp_port = 587
password  = ""                  # Gmail: use App Password from myaccount.google.com
max_fetch = 20

[calendar]
provider    = ""                # set to "ical_url" or "caldav" to enable
ical_url    = ""                # paste a webcal:// or https:// .ics URL here
caldav_url  = ""
username    = ""
password    = ""

[documents]
# Google Drive — create service account at console.cloud.google.com
# OR use OAuth2 token from https://developers.google.com/drive/api
gdrive_token       = ""   # OAuth2 access token

# Notion — create integration at notion.so/my-integrations
notion_token       = ""   # "secret_..."
notion_parent_id   = ""   # page UUID to use as parent for new pages

# Dropbox — create app at dropbox.com/developers/apps
dropbox_token      = ""   # long-lived access token

[calls]
provider           = "auto"   # "twilio" | "macos" | "auto"
twilio_account_sid = ""       # console.twilio.com — Account SID
twilio_auth_token  = ""       # console.twilio.com — Auth Token
twilio_from_number = ""       # Your Twilio phone number e.g. "+14155551234"

[messaging]
# Telegram — fastest to set up, free, no phone needed
# 1. Open Telegram, search @BotFather, type /newbot
# 2. Copy the token below
# 3. Start a chat with your bot, then visit:
#    https://api.telegram.org/bot<TOKEN>/getUpdates to get your chat_id
telegram_token   = ""
telegram_chat_id = ""

# WhatsApp via Twilio (same credentials as [calls] if configured)
twilio_whatsapp_sid   = ""
twilio_whatsapp_token = ""
twilio_whatsapp_from  = "whatsapp:+14155238886"  # Twilio sandbox default — replace with your WhatsApp Business number for production

[search]
provider      = "auto"   # "brave"|"serp"|"ddg"|"auto"
# Brave: 2000 free queries/month — api.search.brave.com/app/keys
brave_api_key = ""
# SerpAPI: 100 free/month — serpapi.com/manage-api-key
serp_api_key  = ""

[push]
# ntfy.sh — free, no account. Install ntfy app, pick a unique topic.
# Subscribe to your topic in the app, then add it here.
topic    = ""            # e.g. "prism-yourname-2024" (keep unique and private)
server   = "https://ntfy.sh"
priority = "default"    # min|low|default|high|urgent

[contacts]
google_token = ""    # Google OAuth token with contacts.readonly scope
auto_extract = true  # extract contacts from prism_memory automatically

[tasks]
provider       = "auto"   # "local"|"todoist"|"github"|"auto"
todoist_token  = ""       # app.todoist.com/settings/integrations/developer
github_token   = ""       # github.com/settings/tokens (repo scope)
github_repo    = ""       # "owner/repo" for issue tracking
linear_api_key = ""       # linear.app/settings/api
