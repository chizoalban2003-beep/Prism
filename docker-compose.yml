services:
  prism:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ~/.prism:/home/prismuser/.prism
      - .:/app
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:8742:8742"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8742/_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  ollama:
    image: ollama/ollama:0.3.12
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 16G

volumes:
  ollama_data:
